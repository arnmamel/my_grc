product: my_grc
history_notes:
  - "This registry centralizes the main maturity snapshots captured across the project so they remain visible after the live scoring model changes."
  - "Some earlier assessments used phase-specific or area-specific models instead of the current 5-dimension delivery-readiness model."
  - "Where a score was not recorded as a single overall number, the entry keeps explicit area scores or labels the score as a proxy."

